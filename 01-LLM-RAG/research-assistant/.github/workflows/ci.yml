name: research-assistant CI

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "01-LLM-RAG/research-assistant/**"
  pull_request:
    paths:
      - "01-LLM-RAG/research-assistant/**"

defaults:
  run:
    working-directory: 01-LLM-RAG/research-assistant

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q
