services:
  app:
    build: .
    ports:
      - "7860:7860"
    env_file: .env
    volumes:
      - ./data:/app/data
      - hf_cache:/app/.hf_cache
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - hf_cache:/app/.hf_cache
    restart: unless-stopped

volumes:
  hf_cache:
