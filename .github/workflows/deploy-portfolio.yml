name: Deploy portfolio

on:
  push:
    branches: [main]
    paths:
      - 'portfolio/**'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects repo
        uses: actions/checkout@v4

      - name: Publish portfolio to the GitHub Pages repo
        env:
          DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::PAGES_DEPLOY_TOKEN secret is not set. Add a PAT with write access to AhmedMostafa167.github.io."
            exit 1
          fi

          TARGET_REPO="AhmedMostafa167/AhmedMostafa167.github.io"
          TARGET_BRANCH="master"
          WORK="$(mktemp -d)"
          BACKUP="$(mktemp -d)"

          git clone --depth 1 \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git" "$WORK"
          cd "$WORK"

          # Preserve Pages metadata that lives in the target repo, not the source.
          for f in .gitignore LICENSE CNAME; do
            [ -f "$f" ] && cp "$f" "$BACKUP/" || true
          done

          # Wipe tracked + untracked files, keeping only .git.
          git rm -rfq . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy the portfolio in (skip repo-only dev files).
          rsync -a \
            --exclude '.git' \
            --exclude 'scripts/deploy.sh' \
            --exclude 'README.md' \
            "${GITHUB_WORKSPACE}/portfolio/" ./

          for f in .gitignore LICENSE CNAME; do
            [ -f "$BACKUP/$f" ] && cp "$BACKUP/$f" ./ || true
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy portfolio refresh from Projects@${GITHUB_SHA::7}"
          git push origin "HEAD:${TARGET_BRANCH}"
