<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ahmed Mostafa</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #a855f7;
            --accent-2: #06b6d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            text-align: center;
        }

        .code {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: clamp(6rem, 18vw, 12rem);
            line-height: 1;
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.25rem, 3vw, 2rem);
            font-weight: 600;
            margin: 1rem 0 0.5rem;
        }

        p {
            color: var(--muted);
            margin-bottom: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        a {
            display: inline-block;
            padding: 0.85rem 1.75rem;
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            color: #fff;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s ease-out;
        }

        a:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <main>
        <div class="code">404</div>
        <h1>Lost in the latent space.</h1>
        <p>$ cd /home</p>
        <a href="/">Take me home</a>
    </main>
</body>
</html>
